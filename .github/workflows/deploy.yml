name: Deploy to EC2 with Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FastAPI 이미지 빌드 및 푸시
      - name: Build and push FastAPI
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: soyoung0/fastapi:board-proxy

      # Nginx 이미지 빌드 및 푸시
      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: soyoung0/nginx:board-proxy

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 프로젝트 폴더로 이동 (폴더가 없다면 생성)
            mkdir -p ~/ex-board
            cd ~/ex-board

            # 2. docker-compose.yaml 파일이 필요하므로 레포지토리에서 새로 받아오거나 복사하는 과정이 필요합니다.
            # 가장 간단한 방법은 실행 시점에 docker-compose 파일을 작성하거나 git pull을 하는 것입니다.
            
            # 3. 기존 서비스 중지 및 최신 이미지 반영 실행
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d