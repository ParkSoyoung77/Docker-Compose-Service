name: Deploy to EC2 with Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # [추가] MySQL 이미지 빌드 및 푸시
      - name: Build and push MySQL
        uses: docker/build-push-action@v5
        with:
          context: ./mysql
          push: true
          tags: soyoung0/mysql:board-proxy

      # FastAPI 이미지 빌드 및 푸시
      - name: Build and push FastAPI
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: soyoung0/fastapi:board-proxy

      # Nginx 이미지 빌드 및 푸시
      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: soyoung0/nginx:board-proxy

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yaml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "~/ex-board"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/ex-board
            cd ~/ex-board
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d