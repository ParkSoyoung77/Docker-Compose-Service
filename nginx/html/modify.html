<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 수정</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

    <style>
      body {
        background-color: #f8f9fa;
        padding-top: 50px;
        padding-bottom: 50px;
      }
      .container {
        max-width: 900px;
      }
      .card {
        border: none;
        border-radius: 15px;
      }
      .card-header {
        border-radius: 15px 15px 0 0 !important;
      }
      /* 에디터 배경색 흰색 고정 */
      .note-editable {
        background-color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card shadow">
        <div class="card-header bg-dark text-white p-3">
          <h4 class="mb-0 text-center">게시글 수정하기</h4>
        </div>
        <div class="card-body p-4">
          <form id="modifyForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">작성자</label>
                <input
                  type="text"
                  id="fuserName"
                  class="form-control bg-light"
                  readonly
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">작성일</label>
                <input
                  type="text"
                  id="fregdate"
                  class="form-control bg-light"
                  readonly
                />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">제목</label>
              <input
                type="text"
                id="fsubject"
                class="form-control"
                placeholder="제목을 입력하세요"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">내용</label>
              <textarea id="summernote"></textarea>
            </div>

            <div class="text-center mt-4 pt-3 border-top">
              <button
                type="button"
                class="btn btn-primary px-5 py-2 fw-bold"
                onclick="updatePost()"
              >
                수정 완료
              </button>
              <button
                type="button"
                class="btn btn-outline-secondary px-5 py-2 ms-2"
                onclick="history.back()"
              >
                취소
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const idx = urlParams.get("idx");

      $(document).ready(function () {
        // 1. Summernote 초기화
        $("#summernote").summernote({
          placeholder: "내용을 수정하세요...",
          tabsize: 2,
          height: 400,
          toolbar: [
            ["style", ["style"]],
            ["font", ["bold", "underline", "clear"]],
            ["color", ["color"]],
            ["para", ["ul", "ol", "paragraph"]],
            ["table", ["table"]],
            ["insert", ["link", "picture", "video"]],
            ["view", ["fullscreen", "codeview", "help"]],
          ],
        });

        // 2. 기존 데이터 로드
        if (idx) {
          $.get(`http://127.0.0.1/api/board/view/${idx}`, function (data) {
            if (data.error) {
              alert(data.error);
              location.href = "list.html";
            } else {
              $("#fuserName").val(data.fuserName);
              $("#fregdate").val(data.fregdate);
              $("#fsubject").val(data.fsubject);

              // 에디터에 기존 내용 채우기 (HTML 형식 유지)
              $("#summernote").summernote("code", data.fcontent);
            }
          });
        }
      });

      function updatePost() {
        // 에디터의 HTML 내용 가져오기
        const content = $("#summernote").summernote("code");
        const subject = $("#fsubject").val();

        if (!subject.trim()) {
          alert("제목을 입력해주세요.");
          return;
        }

        // Summernote 기본 빈 값 체크 (<p><br></p> 등)
        if ($("#summernote").summernote("isEmpty")) {
          alert("내용을 입력해주세요.");
          return;
        }

        const updateData = {
          fsubject: subject,
          fcontent: content,
        };

        $.ajax({
          url: `http://127.0.0.1/api/board/update/${idx}`,
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify(updateData),
          success: function (res) {
            if (res.result === "success") {
              alert("성공적으로 수정되었습니다.");
              location.href = `view.html?idx=${idx}`;
            } else {
              alert("수정 실패: " + res.message);
            }
          },
          error: function () {
            alert("서버 통신 중 오류가 발생했습니다.");
          },
        });
      }
    </script>
  </body>
</html>
