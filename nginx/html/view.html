<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 보기</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body {
        background-color: #f8f9fa;
        padding-top: 50px;
        padding-bottom: 50px;
      }
      .view-card {
        max-width: 850px;
        margin: auto;
        background: white;
        border-radius: 15px;
        border: none;
      }
      .view-header {
        border-bottom: 2px solid #f1f1f1;
        padding: 30px 40px;
      }
      .view-title {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 15px;
        color: #212529;
      }
      .view-meta {
        color: #888;
        font-size: 0.95rem;
      }
      .view-meta span {
        margin-right: 15px;
      }
      .view-content {
        padding: 40px;
        min-height: 350px;
        line-height: 1.7;
        font-size: 1.1rem;
      }
      /* 에디터에서 작성한 HTML 서식이 잘 보이도록 설정 */
      .view-content img {
        max-width: 100%;
        height: auto;
      }
      .btn-area {
        border-top: 1px solid #f1f1f1;
        padding: 20px 40px;
        background-color: #fafafa;
        border-radius: 0 0 15px 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card view-card shadow-sm">
        <div class="view-header">
          <div id="subject" class="view-title">제목을 불러오는 중입니다...</div>
          <div class="view-meta">
            <span><strong>작성자</strong> <span id="userName">-</span></span>
            <span><strong>작성일</strong> <span id="regDate">-</span></span>
            <span><strong>조회수</strong> <span id="hit">-</span></span>
          </div>
        </div>

        <div id="content" class="view-content">내용을 불러오는 중입니다...</div>

        <div class="btn-area d-flex justify-content-between">
          <button
            class="btn btn-outline-dark"
            onclick="location.href = 'list.html'"
          >
            목록으로
          </button>
          <div class="d-flex gap-2">
            <button class="btn btn-success" onclick="goReply()">답변</button>
            <button class="btn btn-primary" onclick="goPass('modify')">
              수정
            </button>
            <button class="btn btn-danger" onclick="goDelete()">삭제</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 답변 기능을 위해 서버에서 받아온 데이터를 저장할 전역 변수
      let currentData = null;

      $(document).ready(function () {
        // 1. URL에서 idx 값 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const fidx = urlParams.get("idx");

        if (!fidx) {
          alert("잘못된 접근입니다.");
          location.href = "list.html";
          return;
        }

        // 2. 서버에 데이터 요청
        $.ajax({
          url: `http://127.0.0.1/api/board/view/${fidx}`,
          type: "GET",
          success: function (data) {
            if (data && !data.error) {
              // 답변 기능을 위해 전체 데이터를 전역 변수에 보관
              currentData = data;

              // 3. 데이터 출력
              $("#subject").text(data.fsubject);
              $("#userName").text(data.fuserName);
              $("#regDate").text(data.fregdate);
              $("#hit").text(data.fhit);

              // 4. 에디터 서식(HTML) 적용
              $("#content").html(data.fcontent);
            } else {
              alert("글을 찾을 수 없거나 삭제되었습니다.");
              location.href = "list.html";
            }
          },
          error: function () {
            alert("서버 통신 오류가 발생했습니다.");
            location.href = "list.html";
          },
        });
      });

      // --- 답변 페이지로 이동하는 함수 ---
      function goReply() {
        if (!currentData) {
          alert("데이터를 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
          return;
        }

        // 부모 글의 계층 정보를 쿼리 스트링으로 전달
        const params = new URLSearchParams({
          mode: "reply",
          p_key: currentData.fkey,
          p_level: currentData.flevel,
          p_step: currentData.fstep,
        });

        location.href = `write.html?${params.toString()}`;
      }

      function goDelete() {
        const urlParams = new URLSearchParams(window.location.search);
        const idx = urlParams.get("idx");

        if (!idx) {
          alert("게시글 번호를 찾을 수 없습니다.");
          return;
        }
        location.href = `pass.html?idx=${idx}`;
      }

      function goPass(mode) {
        const urlParams = new URLSearchParams(window.location.search);
        const idx = urlParams.get("idx");

        if (!idx) {
          alert("게시글 번호를 찾을 수 없습니다.");
          return;
        }
        location.href = `pass.html?idx=${idx}&mode=${mode}`;
      }
    </script>
  </body>
</html>
